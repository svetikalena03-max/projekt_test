<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор идей для постов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg-deep: #0c0c0f;
      --accent: #f4a261;
      --accent-soft: rgba(244, 162, 97, 0.35);
      --text: #ece8e3;
      --card: rgba(22, 22, 28, 0.72);
      --border: rgba(255, 255, 255, 0.08);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      font-optical-sizing: auto;
      background-color: var(--bg-deep);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      overflow-x: hidden;
      position: relative;
    }

    .bg-blobs {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-blobs span {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      animation: blob-float 18s ease-in-out infinite;
    }

    .bg-blobs span:nth-child(1) {
      width: min(55vw, 420px);
      height: min(55vw, 420px);
      background: #2d1f3d;
      top: -12%;
      left: -8%;
      animation-delay: 0s;
    }

    .bg-blobs span:nth-child(2) {
      width: min(50vw, 380px);
      height: min(50vw, 380px);
      background: #1a2d35;
      bottom: -15%;
      right: -10%;
      animation-delay: -6s;
    }

    .bg-blobs span:nth-child(3) {
      width: min(40vw, 300px);
      height: min(40vw, 300px);
      background: #3d2a1f;
      top: 40%;
      left: 28%;
      animation-delay: -12s;
      opacity: 0.4;
    }

    @keyframes blob-float {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      33% {
        transform: translate(4%, 6%) scale(1.05);
      }
      66% {
        transform: translate(-3%, 3%) scale(0.95);
      }
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 38rem;
      width: 100%;
      background: var(--card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 2.25rem 2.5rem;
      border: 1px solid var(--border);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 24px 80px rgba(0, 0, 0, 0.45);
      animation: card-in 0.85s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      opacity: 0;
    }

    @keyframes card-in {
      from {
        opacity: 0;
        transform: translateY(28px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.85rem;
      animation: fade-slide 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.15s both;
    }

    h1 {
      margin: 0 0 1.75rem;
      font-size: clamp(1.5rem, 4vw, 1.85rem);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.02em;
      animation: fade-slide 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.25s both;
    }

    h1::after {
      content: "";
      display: block;
      height: 3px;
      width: 0;
      margin-top: 1rem;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
      animation: line-grow 1s cubic-bezier(0.22, 1, 0.36, 1) 0.55s forwards;
    }

    @keyframes line-grow {
      to {
        width: 4.5rem;
      }
    }

    @keyframes fade-slide {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    ul {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    li {
      position: relative;
      padding: 1rem 1.15rem 1rem 3rem;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid transparent;
      line-height: 1.5;
      color: var(--text);
      transition:
        border-color 0.35s ease,
        background 0.35s ease,
        transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
        box-shadow 0.35s ease;
      animation: item-in 0.65s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    li:nth-child(1) { animation-delay: 0.45s; }
    li:nth-child(2) { animation-delay: 0.58s; }
    li:nth-child(3) { animation-delay: 0.71s; }

    @keyframes item-in {
      from {
        opacity: 0;
        transform: translateX(-16px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    li::before {
      content: "";
      position: absolute;
      left: 1.1rem;
      top: 50%;
      width: 8px;
      height: 8px;
      margin-top: -4px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 16px var(--accent-soft);
      animation: pulse-dot 2.4s ease-in-out infinite;
    }

    li:nth-child(2)::before { animation-delay: 0.4s; }
    li:nth-child(3)::before { animation-delay: 0.8s; }

    @keyframes pulse-dot {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.15);
        opacity: 0.75;
      }
    }

    li:hover {
      border-color: rgba(244, 162, 97, 0.25);
      background: rgba(244, 162, 97, 0.06);
      transform: translateX(6px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    @media (prefers-reduced-motion: reduce) {
      .bg-blobs span,
      li::before {
        animation: none;
      }
      main,
      .badge,
      h1,
      li {
        animation: none;
        opacity: 1;
        transform: none;
      }
      h1::after {
        animation: none;
        width: 4.5rem;
      }
      li:hover {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
  </div>
  <main>
    <span class="badge">Контент</span>
    <h1>Генератор идей для постов</h1>
    <ul>
      <li>5 идей постов для экспертов</li>
      <li>3 идеи сториз на сегодня</li>
      <li>контент план на неделю</li>
    </ul>
  </main>
</body>
</html>
