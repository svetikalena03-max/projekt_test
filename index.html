<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор идей для постов</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(160deg, #f0f4ff 0%, #e8f0fe 50%, #f5f0ff 100%);
      color: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    main {
      max-width: 36rem;
      width: 100%;
      background: #fff;
      border-radius: 16px;
      padding: 2rem 2.25rem;
      box-shadow: 0 12px 40px rgba(30, 40, 90, 0.12);
    }
    h1 {
      margin: 0 0 1.5rem;
      font-size: 1.65rem;
      font-weight: 700;
      line-height: 1.25;
      color: #16213e;
    }
    ul {
      margin: 0;
      padding-left: 1.25rem;
      line-height: 1.7;
    }
    li {
      margin-bottom: 0.65rem;
    }
    li:last-child {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <main>
    <h1>Генератор идей для постов</h1>
    <ul>
      <li>5 идей постов для экспертов</li>
      <li>3 идеи сториз на сегодня</li>
      <li>контент план на неделю</li>
    </ul>
  </main>
</body>
</html>
